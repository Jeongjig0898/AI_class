<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <div class="translator-container">
        <h1>AI Translator</h1>
        <div class="main-content">
            <div class="io-container">
                <div class="textarea-container" id="input-container">
                    <textarea id="source-text" placeholder="Enter text to translate..."></textarea>
                </div>
                <div class="textarea-container result-container" id="output-container">
                    <textarea id="translated-text" placeholder="Translation" readonly></textarea>
                    <button id="listen-btn" aria-label="Listen to translation">
                        <span class="material-symbols-outlined">
                            volume_up
                        </span>
                    </button>
                </div>
            </div>
            <div class="controls">
                <div class="language-selector">
                    <label for="target-language">Translate to:</label>
                    <select id="target-language">
                        <option value="ko">Korean</option>
                        <option value="en" selected>English</option>
                        <option value="ja">Japanese</option>
                        <option value="zh">Chinese</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                    </select>
                </div>
                <button id="translate-btn">Translate</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
